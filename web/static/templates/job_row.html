<tr>
    <td class="job-id" title="{{.ID}}">{{.ID}}</td>
    <td>{{.Name}}</td>
    <td>{{.Date}}</td>
    <td>
        <span class="status-indicator status-{{.Status}}">
            {{- if eq .Status "ok" -}}concluído
            {{- else if eq .Status "pending" -}}pendente
            {{- else if eq .Status "working" -}}processando
            {{- else if eq .Status "failed" -}}falhou
            {{- else -}}{{.Status}}{{- end -}}
        </span>
    </td>
    <td class="actions">
        {{ if eq .Status "ok" }}
            <a href="/download?id={{.ID}}" download class="button download-button">⬇ Baixar</a>
        {{ end }}
        <button hx-delete="/delete?id={{.ID}}"
                hx-target="closest tr"
                hx-swap="outerHTML"
                hx-confirm="Tem certeza que deseja excluir esta busca?"
                class="delete-button">✕ Excluir</button>
    </td>
</tr>
